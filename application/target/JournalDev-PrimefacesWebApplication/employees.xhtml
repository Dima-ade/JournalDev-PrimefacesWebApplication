<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="http://java.sun.com/jsf/html"
	  xmlns:p="http://primefaces.org/ui"
	  xmlns:f="http://xmlns.jcp.org/jsf/core">
	<h:head></h:head>

	<h:body>
		<h2>Primefaces DataTable with pagination</h2>
		<h:form>
			<p:dataTable id="empDataTable" value="#{viewEmpFromDBManagedBean.employees}" var="employee"  paginator="true" rows="5"
						 paginatorTemplate="{CurrentPageReport} {FirstPageLink}
						 {PreviousPageLink} {PageLinks} {NextPageLink}
						 {LastPageLink}">
				<f:facet name="header">
					List of Employees
				</f:facet>
				<p:column>
					<f:facet name="header">
						<h:outputText value="Employee ID"></h:outputText>
					</f:facet>
					<h:outputText value="#{employee.employeeId}"></h:outputText>
				</p:column>
				<p:column>
					<f:facet name="header">
						<h:outputText value="Employee Name"></h:outputText>
					</f:facet>
					<h:outputText value="#{employee.employeeName}"></h:outputText>
				</p:column>
				<f:facet name="footer">
					In total there are #{viewEmpFromDBManagedBean.getLength()} employees.
				</f:facet>
			</p:dataTable>
		</h:form>
	</h:body>
</html>
