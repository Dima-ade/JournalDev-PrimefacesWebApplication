
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <h:outputScript library="js" name="handleLoginRequest.js" />
</h:head>

<h:body>

    <h:form id="loginForm">

        <!-- Login link -->
        <h:outputLink id="loginLink"
                      value="javascript:void(0)"
                      onclick="PF('dlg').show();">
            <span>Login</span>
        </h:outputLink>

        <!-- Growl for messages -->
        <p:growl id="growl" showDetail="true" life="3000" />

        <!-- Login dialog -->
        <p:dialog header="Login"
                  widgetVar="dlg"
                  modal="true"
                  resizable="false"
                  closable="true">

            <h:panelGrid columns="2" cellpadding="5">

                <h:outputLabel for="username" value="Username:" />
                <p:inputText id="username"
                             value="#{userLoginView.username}"
                             required="true"
                             label="username" />

                <h:outputLabel for="password" value="Password:" />
                <p:password id="password"
                            value="#{userLoginView.password}"
                            required="true"
                            label="password" />

            </h:panelGrid>

            <!-- Footer MUST be here, not inside panelGrid -->
            <f:facet name="footer">
                <p:commandButton value="Login"
                                 update="growl"
                                 action="#{userLoginView.login}"
                                 oncomplete="handleLoginRequest(xhr, status, args)" />
            </f:facet>

        </p:dialog>

    </h:form>

</h:body>
</html>
